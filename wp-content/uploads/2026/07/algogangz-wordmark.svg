<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">알고갱즈 워드마크</title>
  <desc id="desc">다크 배경용 가로형 로고. 흰색 워드마크와 파랑 악센트 라인.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .ink { fill: #FFFFFF; font-family: Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif; font-weight: 800; letter-spacing: -0.04em; }
      .sub { fill: #A9A9A2; font-family: Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif; font-weight: 600; letter-spacing: 0.12em; }
      .accent { stroke: #3987E5; stroke-width: 10; stroke-linecap: round; }
      .accent-soft { stroke: #6AA9F0; stroke-width: 3; stroke-linecap: round; opacity: 0.9; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="260"/>
  <line class="accent" x1="24" y1="52" x2="96" y2="52"/>
  <text class="ink" x="24" y="154" font-size="96">알고갱즈</text>
  <line class="accent-soft" x1="28" y1="180" x2="282" y2="180"/>
  <text class="sub" x="24" y="220" font-size="26">MACRO SIGNALS · QUANT VALIDATION</text>
</svg>
